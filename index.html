<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Plains Archaic</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      padding: 30px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .description {
      margin-top: 10px;
      opacity: 0.6;
      font-size: 0.9rem;
      max-width: 600px;
      line-height: 1.5;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    .tile {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      background: #111;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;

      transition:
        transform 0.4s ease,
        opacity 0.4s ease;
    }

    .tile:hover img {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .overlay {
      position: absolute;
      inset: 0;

      display: flex;
      align-items: flex-end;

      padding: 15px;

      background: linear-gradient(
        to top,
        rgba(0,0,0,0.85),
        rgba(0,0,0,0)
      );

      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .tile:hover .overlay {
      opacity: 1;
    }

    .title {
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    footer {
      padding: 50px 20px;
      text-align: center;
      opacity: 0.4;
      font-size: 0.8rem;
    }

    @media (max-width: 700px) {
      .overlay {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Plains Archaic</h1>

    <div class="description">
      Digital archive 
    </div>
  </header>

  <main class="gallery">

    <a class="tile" href="releases/release1.html">
      <img src="images/release1.jpg" alt="Release 1">

      <div class="overlay">
        <div class="title">Release One</div>
      </div>
    </a>

    <a class="tile" href="releases/release2.html">
      <img src="images/release2.jpg" alt="Release 2">

      <div class="overlay">
        <div class="title">Release Two</div>
      </div>
    </a>

    <a class="tile" href="releases/release3.html">
      <img src="images/release3.jpg" alt="Release 3">

      <div class="overlay">
        <div class="title">Release Three</div>
      </div>
    </a>

    <a class="tile" href="releases/release4.html">
      <img src="images/release4.jpg" alt="Release 4">

      <div class="overlay">
        <div class="title">Release Four</div>
      </div>
    </a>

  </main>

  <footer>
    Plains Archaic — Independent Archive
  </footer>

</body>
</html>
